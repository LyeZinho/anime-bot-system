version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-animebot}:${DB_PASSWORD:-animebot123}@postgres:5432/${DB_NAME:-animebot}
      - REDIS_URL=redis://redis:6379
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: anime-bot-db
    restart: unless-stopped
    ports:
      - "11999:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-animebot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-animebot123}
      POSTGRES_DB: ${DB_NAME:-animebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-animebot} -d ${DB_NAME:-animebot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anime-bot-redis
    restart: unless-stopped
    ports:
      - "11998:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
